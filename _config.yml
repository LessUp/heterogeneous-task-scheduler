title: Heterogeneous Task Scheduler
description: >-
  C++ 异构任务调度框架 — DAG 依赖管理、GPU 内存池、CPU/CUDA 流异步并发执行
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/heterogeneous-task-scheduler
show_downloads: false

# SEO & metadata
url: https://lessup.github.io
baseurl: /heterogeneous-task-scheduler
lang: zh-CN
author: LessUp

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default

# Exclude irrelevant files from Jekyll build
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - include
  - src
  - examples
  - tests
  - build
  - cmake-build-*
  - CMakeLists.txt
  - CMakePresets.json
  - .editorconfig
  - .gitignore
  - "*.cu"
  - "*.cuh"
  - "*.cpp"
  - "*.hpp"
  - "*.h"
  - "*.o"
  - "*.so"
  - Gemfile
  - Gemfile.lock
  - vendor
