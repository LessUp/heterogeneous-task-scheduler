name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Format Check
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check C/C++/CUDA formatting
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: '17'
          check-path: '.'
          exclude-regex: '(^|/)(build|third_party|external|vendor|\.git|\.kiro)(/|$)'
          fallback-style: 'LLVM'

  # Markdown Lint
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            *.md
            changelog/*.md
            .github/**/*.md
            docs/**/*.md
          config: |
            {
              "default": true,
              "MD001": true,
              "MD003": { "style": "atx" },
              "MD004": { "style": "dash" },
              "MD005": true,
              "MD007": { "indent": 2 },
              "MD009": { "br_spaces": 2 },
              "MD010": true,
              "MD011": true,
              "MD012": { "maximum": 2 },
              "MD013": false,
              "MD014": true,
              "MD018": true,
              "MD019": false,
              "MD022": true,
              "MD023": true,
              "MD024": { "siblings_only": true },
              "MD025": true,
              "MD026": { "punctuation": ".,;:!" },
              "MD027": true,
              "MD028": true,
              "MD029": { "style": "ordered" },
              "MD030": true,
              "MD031": true,
              "MD032": true,
              "MD033": false,
              "MD034": false,
              "MD035": { "style": "---" },
              "MD036": false,
              "MD037": true,
              "MD038": true,
              "MD039": true,
              "MD040": false,
              "MD041": false,
              "MD042": true,
              "MD045": true,
              "MD046": { "style": "fenced" },
              "MD047": true,
              "MD048": { "style": "backtick" },
              "MD049": { "style": "underscore" },
              "MD050": { "style": "asterisk" },
              "MD051": true,
              "MD052": true,
              "MD053": true
            }

  # YAML Lint
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: |
            .github/workflows
            _config.yml
          config_data: |
            extends: default
            rules:
              line-length:
                max: 150
                level: warning
              truthy:
                check-keys: false
              comments:
                min-spaces-from-content: 1
              document-start: disable

  # Jekyll Build Test
  jekyll-test:
    name: Jekyll Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            *.md
            _config.yml
            docs
            changelog
            LICENSE
            index.md

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: |
          gem install bundler
          gem install jekyll
          gem install jekyll-seo-tag jekyll-sitemap jekyll-feed jekyll-remote-theme webrick

      - name: Build Jekyll site
        run: |
          jekyll build --destination ./_site || echo "Jekyll build completed with warnings"
        continue-on-error: true

      - name: Verify build output
        run: |
          if [ -d "./_site" ]; then
            echo "✅ Jekyll build successful"
            ls -la ./_site
          else
            echo "⚠️ Jekyll build may have issues"
          fi

  # Summary
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [format-check, markdown-lint, yaml-lint, jekyll-test]
    if: always()
    steps:
      - name: Check Status
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format Check | ${{ needs.format-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown Lint | ${{ needs.markdown-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Lint | ${{ needs.yaml-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Jekyll Test | ${{ needs.jekyll-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
