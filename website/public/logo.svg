<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Sky Blue 渐变 - 主品牌色 -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <style>
      .logo-bg { fill: url(#logoGradient); }
      .logo-node { fill: white; opacity: 0.95; }
      .logo-edge { stroke: white; stroke-width: 2.5; opacity: 0.8; fill: none; stroke-linecap: round; }
      .logo-text { fill: white; font-family: Arial, sans-serif; font-weight: bold; }
    </style>
  </defs>

  <!-- 主圆环背景 -->
  <circle cx="50" cy="50" r="45" class="logo-bg" />

  <!-- DAG 节点 - 三个任务节点 (上两个输入，下一个输出) -->
  <!-- 左上节点 - CPU 任务 -->
  <circle cx="32" cy="30" r="9" class="logo-node" />
  <!-- 右上节点 - GPU 任务 -->
  <circle cx="68" cy="30" r="9" class="logo-node" />
  <!-- 底部节点 - 汇聚任务 -->
  <circle cx="50" cy="68" r="9" class="logo-node" />

  <!-- DAG 边 - 依赖关系 (从上向下汇聚) -->
  <!-- 左边依赖 -->
  <line x1="38" y1="37" x2="44" y2="59" class="logo-edge" />
  <!-- 右边依赖 -->
  <line x1="62" y1="37" x2="56" y2="59" class="logo-edge" />

  <!-- H 文字 - 放在中心区域 -->
  <text x="50" y="47" font-size="18" text-anchor="middle" class="logo-text">H</text>

  <!-- 小装饰点 - 增强视觉层次 -->
  <circle cx="50" cy="15" r="2" fill="white" opacity="0.6" />
  <circle cx="20" cy="50" r="2" fill="white" opacity="0.4" />
  <circle cx="80" cy="50" r="2" fill="white" opacity="0.4" />
</svg>
